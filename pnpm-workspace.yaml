packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@firebase/util': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
onlyBuiltDependencies:
  - esbuild
  - sharp
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - protobufjs
  - '@firebase/util'
